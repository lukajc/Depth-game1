<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DEPTH</title>
<style>
:root {
  --green:#00ff88; --green-dim:#00aa55; --green-dark:#003d1a;
  --red:#ff4444; --navy:#040d1a; --bg:#040d0a;
  --grid:#0a2e1a; --text-dim:#1a6640;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  background:var(--navy); font-family:'Courier New',monospace;
  width:100%; height:100%; overflow:hidden; user-select:none;
  position:fixed; /* prevents iOS scroll bounce */
}
body {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}

/* ── START OVERLAY ── */
#start-overlay {
  position:fixed; inset:0; background:rgba(4,13,26,0.97);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:300; gap:16px; padding:20px;
}
#start-overlay h1 { color:var(--green); font-size:clamp(28px,8vw,42px); letter-spacing:10px; font-weight:700; }
#start-overlay p  { color:var(--text-dim); font-size:clamp(10px,2.5vw,12px); letter-spacing:3px; text-align:center; line-height:2.2; }
#start-btn {
  background:var(--green-dark); border:2px solid var(--green); color:var(--green);
  font-family:'Courier New',monospace; font-size:clamp(12px,3vw,14px); font-weight:700;
  letter-spacing:4px; padding:14px 36px; border-radius:8px; cursor:pointer;
  min-height:52px; min-width:160px;
}

/* ── MAIN CONTAINER ── */
#game-container {
  display:flex; flex-direction:column; align-items:center;
  width:100%; height:100%;
  padding:env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 8px) 12px;
  gap:0;
  justify-content:space-between;
  max-width:500px;
}

/* ── TOP BAR ── */
#top-bar {
  display:flex; justify-content:space-between; align-items:center;
  width:100%; padding:6px 0 4px;
  flex-shrink:0;
}
#title { color:var(--green); font-size:clamp(16px,5vw,20px); letter-spacing:8px; font-weight:700; }
#best-win { color:#1a5535; font-size:clamp(9px,2vw,10px); letter-spacing:1px; text-align:right; line-height:1.6; }
#best-win span { color:var(--green-dim); font-weight:700; }

/* ── SOUND TOGGLE ── */
#sound-toggle {
  position:fixed; top:max(12px, env(safe-area-inset-top)); right:12px;
  background:var(--bg); border:1px solid #0d3320; color:var(--text-dim);
  font-family:'Courier New',monospace; font-size:9px; letter-spacing:2px;
  padding:5px 8px; border-radius:4px; cursor:pointer; z-index:100;
  min-height:32px; min-width:52px;
}
#sound-toggle.on { color:var(--green); border-color:var(--green-dim); }

/* ── RADAR ── */
#radar-wrapper {
  position:relative;
  width:min(calc(100vw - 24px), calc(100vh - 280px), 420px);
  aspect-ratio:1;
  flex-shrink:0;
  margin:4px auto;
}
#radar-canvas { width:100%; height:100%; border-radius:50%; display:block; }

/* ── PHASE OVERLAY ── */
#phase-overlay {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  border-radius:50%; pointer-events:none; opacity:0; transition:opacity 0.25s;
}
#phase-overlay.visible { opacity:1; }
#phase-text { font-size:clamp(10px,3vw,13px); letter-spacing:4px; font-weight:700; text-align:center; color:var(--green); }
#phase-text.red { color:var(--red); }
#phase-count { font-size:clamp(26px,8vw,34px); font-weight:700; text-align:center; color:var(--green); margin-top:4px; }
#phase-count.red { color:var(--red); font-size:clamp(10px,2.5vw,13px); letter-spacing:1px; margin-top:6px; }

/* ── FAKE PLAYERS ── */
#players-feed { width:100%; min-height:14px; display:flex; flex-direction:column; gap:2px; flex-shrink:0; padding:0 2px; }
.player-event { font-size:clamp(9px,2.2vw,10px); letter-spacing:0.5px; opacity:0; transition:opacity 0.3s; }
.player-event.win  { color:var(--green-dim); }
.player-event.loss { color:#ff5555; }
.player-event.show { opacity:1; }

/* ── MULTIPLIER ── */
#multiplier-zone { text-align:center; line-height:1; flex-shrink:0; padding:2px 0; }
#mult-label { color:var(--text-dim); font-size:clamp(8px,2vw,9px); letter-spacing:3px; margin-bottom:2px; }
#multiplier {
  font-size:clamp(48px,14vw,72px); font-weight:700; letter-spacing:2px;
  font-variant-numeric:tabular-nums; transition:color 0.4s; color:var(--green);
}
#multiplier.zone1 { color:#00ff88; }
#multiplier.zone2 { color:#ccdd00; }
#multiplier.zone3 { color:#ff8800; }
#multiplier.zone4 { color:#ff3333; }
#multiplier.crashed { color:#ff2222; }

/* ── WIN DISPLAY ── */
#win-display { color:#1a8850; font-size:clamp(11px,2.8vw,13px); letter-spacing:1px; text-align:center; min-height:16px; flex-shrink:0; }

/* ── SESSION STATS ── */
#session-stats {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  background:var(--bg); border:1px solid #0a1e10; border-radius:6px;
  padding:5px 10px; flex-shrink:0;
}
.stat-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
.stat-label { color:#0d3320; font-size:clamp(7px,1.8vw,8px); letter-spacing:2px; }
.stat-value { font-size:clamp(10px,2.5vw,12px); font-weight:700; }
.stat-value.pos { color:#00cc66; }
.stat-value.neg { color:#ff5555; }
.stat-value.neu { color:#1a6640; }

/* ── HISTORY ── */
#history-strip {
  display:flex; gap:4px; justify-content:center; width:100%; flex-shrink:0;
}
.hpill {
  padding:2px 6px; border-radius:8px; font-size:clamp(9px,2.2vw,10px); font-weight:700;
  flex:1; text-align:center; max-width:64px;
}
.hpill.low  { background:#1a0a0a; color:#ff6666; border:1px solid #2a0808; }
.hpill.mid  { background:#0a1a0a; color:#00cc66; border:1px solid #0a2a0a; }
.hpill.high { background:#08083a; color:#7799ff; border:1px solid #0a0a3a; }

/* ── CONTROLS ── */
#controls { display:flex; gap:8px; width:100%; flex-shrink:0; padding-bottom:4px; }
#bet-box {
  flex:1; background:var(--bg); border:1px solid #0d3320; border-radius:8px;
  padding:8px 10px; display:flex; flex-direction:column; gap:3px;
}
#bet-label { color:var(--text-dim); font-size:clamp(7px,1.8vw,8px); letter-spacing:2px; }
#bet-row   { display:flex; align-items:center; gap:5px; }
#bet-amount { color:#00cc6a; font-size:clamp(16px,4.5vw,19px); font-weight:700; flex:1; }
.bbet {
  background:#0a2010; border:1px solid #0d3320; color:var(--green-dim);
  font-size:clamp(14px,3.5vw,16px); width:clamp(28px,8vw,32px); height:clamp(28px,8vw,32px);
  border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}

#auto-box {
  display:flex; flex-direction:column; gap:2px;
  background:var(--bg); border:1px solid #0d3320; border-radius:8px; padding:8px 8px;
  min-width:80px;
}
#auto-label { color:var(--text-dim); font-size:clamp(7px,1.8vw,8px); letter-spacing:1px; }
#auto-row   { display:flex; align-items:center; gap:3px; }
#auto-input {
  width:100%; background:#020808; border:1px solid #0d3320; color:#00cc6a;
  font-family:'Courier New',monospace; font-size:clamp(13px,3.5vw,15px); font-weight:700;
  padding:2px 4px; border-radius:3px; text-align:center; min-height:28px;
}
#auto-input:focus { outline:none; border-color:var(--green); }
#auto-unit { color:#1a6640; font-size:11px; flex-shrink:0; }

#surface-btn {
  flex:1.5; background:var(--green-dark); border:2px solid var(--green); border-radius:8px;
  color:var(--green); font-family:'Courier New',monospace;
  font-size:clamp(12px,3.5vw,15px); font-weight:700;
  letter-spacing:2px; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px; padding:8px;
  transition:background 0.1s, transform 0.05s;
  min-height:clamp(52px,14vw,64px);
}
#surface-btn:hover:not(:disabled) { background:#005522; }
#surface-btn:active:not(:disabled){ transform:scale(0.97); }
#surface-btn:disabled { opacity:0.28; cursor:not-allowed; border-color:#1a4430; color:#1a4430; }
#surface-btn .spre { font-size:clamp(7px,2vw,9px); letter-spacing:2px; color:#1aff88; opacity:0.7; }

/* ── STATUS ── */
#status-bar { color:#0a2010; font-size:clamp(7px,1.8vw,8px); letter-spacing:2px; text-align:center; flex-shrink:0; padding-bottom:2px; }
</style>
</head>
<body>

<div id="start-overlay">
  <h1>DEPTH</h1>
  <p>SUBMARINE RADAR<br>CASH OUT BEFORE THEY FIND YOU</p>
  <button id="start-btn">▼ DIVE IN</button>
</div>

<button id="sound-toggle" class="on">♪ ON</button>

<div id="game-container">
  <div id="top-bar">
    <div id="title">DEPTH</div>
    <div id="best-win">BEST SESSION<br>★ <span id="best-val">—</span></div>
  </div>

  <div id="radar-wrapper">
    <canvas id="radar-canvas"></canvas>
    <div id="phase-overlay">
      <div>
        <div id="phase-text"></div>
        <div id="phase-count"></div>
      </div>
    </div>
  </div>

  <div id="players-feed">
    <div class="player-event" id="pev0"></div>
    <div class="player-event" id="pev1"></div>
  </div>

  <div id="multiplier-zone">
    <div id="mult-label">MULTIPLIER</div>
    <div id="multiplier" class="zone1">1.00×</div>
  </div>

  <div id="win-display">BET $10.00  →  WIN $10.00</div>

  <div id="session-stats">
    <div class="stat-item">
      <div class="stat-label">WON</div>
      <div class="stat-value pos" id="stat-won">$0.00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">LOST</div>
      <div class="stat-value neg" id="stat-lost">$0.00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">NET</div>
      <div class="stat-value neu" id="stat-net">$0.00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">ROUNDS</div>
      <div class="stat-value neu" id="stat-rounds">0</div>
    </div>
  </div>

  <div id="history-strip"></div>

  <div id="controls">
    <div id="bet-box">
      <div id="bet-label">BET</div>
      <div id="bet-row">
        <button class="bbet" id="bet-dn">−</button>
        <div id="bet-amount">$10.00</div>
        <button class="bbet" id="bet-up">+</button>
      </div>
    </div>
    <div id="auto-box">
      <div id="auto-label">AUTO AT</div>
      <div id="auto-row">
        <input id="auto-input" type="number" min="1.1" max="1000" step="0.1" placeholder="OFF">
        <span id="auto-unit">×</span>
      </div>
    </div>
    <button id="surface-btn" disabled>
      <span class="spre">PRESS TO</span>
      <span>▲ SURFACE</span>
    </button>
  </div>

  <div id="status-bar">● CONNECTED &nbsp;|&nbsp; ROUND <span id="round-num">1</span></div>
</div>

<script>
// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let AC=null, soundOn=true, hbInterval=null, hbBPM=58;

function ensureAC(){
  if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
}
function heartbeat(){
  if(!AC||!soundOn) return;
  const t=AC.currentTime;
  const lo=AC.createOscillator(),lg=AC.createGain(),lf=AC.createBiquadFilter();
  lf.type='lowpass';lf.frequency.value=130;lo.type='sine';
  lo.frequency.setValueAtTime(58,t);lo.frequency.exponentialRampToValueAtTime(28,t+.14);
  lg.gain.setValueAtTime(0,t);lg.gain.linearRampToValueAtTime(.75,t+.02);lg.gain.exponentialRampToValueAtTime(.001,t+.24);
  lo.connect(lf);lf.connect(lg);lg.connect(AC.destination);lo.start(t);lo.stop(t+.26);
  const do2=AC.createOscillator(),dg=AC.createGain(),df=AC.createBiquadFilter();
  df.type='lowpass';df.frequency.value=110;do2.type='sine';
  do2.frequency.setValueAtTime(68,t+.20);do2.frequency.exponentialRampToValueAtTime(34,t+.34);
  dg.gain.setValueAtTime(0,t+.20);dg.gain.linearRampToValueAtTime(.48,t+.22);dg.gain.exponentialRampToValueAtTime(.001,t+.40);
  do2.connect(df);df.connect(dg);dg.connect(AC.destination);do2.start(t+.20);do2.stop(t+.42);
}
function startHB(bpm){
  stopHB();hbBPM=bpm;if(!soundOn||!AC)return;
  heartbeat();hbInterval=setInterval(()=>heartbeat(),60000/hbBPM);
}
function updateHB(bpm){
  bpm=Math.round(bpm);if(bpm===hbBPM)return;hbBPM=bpm;stopHB();
  if(soundOn&&AC&&phase==='active'){heartbeat();hbInterval=setInterval(()=>heartbeat(),60000/hbBPM);}
}
function stopHB(){clearInterval(hbInterval);hbInterval=null;}

function ping(){
  if(!AC||!soundOn)return;
  const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
  f.type='bandpass';f.frequency.value=900;f.Q.value=9;o.type='sine';
  o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(440,t+.5);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.15,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.6);
  o.connect(f);f.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+.65);
}
function creak(){
  if(!AC||!soundOn)return;
  const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
  f.type='bandpass';f.frequency.value=210;f.Q.value=3;o.type='sawtooth';
  o.frequency.setValueAtTime(190,t);o.frequency.linearRampToValueAtTime(85,t+.35);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.10,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.45);
  o.connect(f);f.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+.5);
}
function explosion(){
  if(!AC||!soundOn)return;
  const t=AC.currentTime,sr=AC.sampleRate,buf=AC.createBuffer(1,sr*1.8,sr),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const ns=AC.createBufferSource();ns.buffer=buf;
  const ng=AC.createGain(),nf=AC.createBiquadFilter();
  nf.type='lowpass';nf.frequency.value=280;
  ng.gain.setValueAtTime(.85,t);ng.gain.exponentialRampToValueAtTime(.001,t+1.6);
  ns.connect(nf);nf.connect(ng);ng.connect(AC.destination);ns.start(t);
  const bo=AC.createOscillator(),bg=AC.createGain();
  bo.type='sine';bo.frequency.setValueAtTime(85,t);bo.frequency.exponentialRampToValueAtTime(18,t+.9);
  bg.gain.setValueAtTime(.9,t);bg.gain.exponentialRampToValueAtTime(.001,t+1.1);
  bo.connect(bg);bg.connect(AC.destination);bo.start(t);bo.stop(t+1.2);
}
function splash(){
  if(!AC||!soundOn)return;
  const t=AC.currentTime;
  for(let i=0;i<4;i++){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.setValueAtTime(420+i*130,t+i*.07);o.frequency.exponentialRampToValueAtTime(200,t+i*.07+.16);
    g.gain.setValueAtTime(.11,t+i*.07);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.22);
    o.connect(g);g.connect(AC.destination);o.start(t+i*.07);o.stop(t+i*.07+.24);
  }
}

// ══════════════════════════════════════════
// FAKE PLAYERS
// ══════════════════════════════════════════
const NAMES=['Alex K.','Giorgi M.','Nino T.','David L.','Mariam S.','Lasha B.',
             'Ana G.','Zura K.','Tamta R.','Irakli P.','Sophie D.','Nika V.',
             'Elene C.','Tornike J.','Keti N.','Beka O.','Salome A.','Gigi F.'];
let feedSlot=0, fakeTimer=null;

function fakeCashout(m){
  const name=NAMES[Math.floor(Math.random()*NAMES.length)];
  const b=[1,2,5,10,20,50][Math.floor(Math.random()*6)];
  showFeed(`▲ ${name} cashed out ${m.toFixed(2)}×  +$${(b*m).toFixed(2)}`,'win');
}
function fakeLoss(){
  showFeed(`✗ ${NAMES[Math.floor(Math.random()*NAMES.length)]} lost their bet`,'loss');
}
function showFeed(msg,type){
  const el=document.getElementById('pev'+feedSlot);
  feedSlot=(feedSlot+1)%2;
  el.textContent=msg; el.className='player-event '+type;
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>el.classList.remove('show'),3000);
}
function scheduleFake(){
  clearTimeout(fakeTimer);
  if(phase!=='active')return;
  fakeTimer=setTimeout(()=>{
    if(phase!=='active')return;
    const fm=mult*(0.85+Math.random()*.4);
    if(fm>=1.05)fakeCashout(parseFloat(fm.toFixed(2)));
    scheduleFake();
  },900+Math.random()*2200);
}

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
const cv=document.getElementById('radar-canvas');
const rc=cv.getContext('2d');
const multEl=document.getElementById('multiplier');
const winEl=document.getElementById('win-display');
const surfBtn=document.getElementById('surface-btn');
const povEl=document.getElementById('phase-overlay');
const ptEl=document.getElementById('phase-text');
const pcEl=document.getElementById('phase-count');
const rnEl=document.getElementById('round-num');
const betEl=document.getElementById('bet-amount');
const hStrip=document.getElementById('history-strip');
const bestEl=document.getElementById('best-val');
const wonEl=document.getElementById('stat-won');
const lostEl=document.getElementById('stat-lost');
const netEl=document.getElementById('stat-net');
const rndEl=document.getElementById('stat-rounds');

const BETS=[1,2,5,10,20,50,100,200,500];
let bIdx=3,bet=10,rNum=1,phase='betting';
let mult=1,crashPt=1,sweepA=-Math.PI/2;
let t0=0,bcdTimer=null,history=[],cashedOut=false,speedMult=1;
let sTotalWon=0,sTotalLost=0,sRounds=0,sBest=0;

// ── ENEMY STATE ──
// behaviorType: 'hunt' | 'flee' | 'stalk'
// hunt  (30%): approaches center over next 2-3 sweeps — "it found me"
// flee  (40%): appears heading toward center, next sweep jumps far away — "I tricked it"
// stalk (30%): silently creeps closer each sweep, small increments — "silent hunter"
let eAngle=Math.random()*Math.PI*2, eDist=0.75;
let eVisible=false, eTimer=0, ePulse=0;
let detected=false;
let eBehavior='stalk';      // current behavior type
let eHuntSweeps=0;          // countdown for hunt sweeps
let isCrash=false, crashFlash=0;

function resize(){
  const w=document.getElementById('radar-wrapper').offsetWidth;
  cv.width=w; cv.height=w;
}
resize();
window.addEventListener('resize',()=>{ resize(); });

function genCrash(){
  if(Math.random()<.04)return 1.00;
  return Math.max(1.01,1/(1-Math.random()*.96));
}
function getBPM(){
  if(mult<3)return 58;
  return Math.floor(58+Math.min((mult-3)/12,1)*62);
}
function getSweepSpeed(){
  if(mult<3)return 0.020;
  return 0.020+Math.min((mult-3)/12,1)*0.052;
}
function getMultColor(){
  if(mult<3) return['zone1','0,255,136'];
  if(mult<7) return['zone2','200,220,0'];
  if(mult<15)return['zone3','255,136,0'];
  return['zone4','255,50,50'];
}
function getRadarDark(){ return Math.min((mult-1)/19,1); }
function calcMult(el){ return Math.max(1.00,Math.pow(Math.E,el*0.046*speedMult)); }

function updateStats(won,lost){
  sTotalWon+=won; sTotalLost+=lost; sRounds++;
  const net=sTotalWon-sTotalLost;
  wonEl.textContent='$'+sTotalWon.toFixed(2);
  lostEl.textContent='$'+sTotalLost.toFixed(2);
  netEl.textContent=(net>=0?'+':'')+net.toFixed(2);
  netEl.className='stat-value '+(net>0?'pos':net<0?'neg':'neu');
  rndEl.textContent=sRounds;
}

// ── PHASES ──
function startBetting(){
  phase='betting'; mult=1; cashedOut=false;
  sweepA=-Math.PI/2; crashFlash=0; isCrash=false;
  eAngle=Math.random()*Math.PI*2; eDist=.68+Math.random()*.22;
  eVisible=false; eTimer=0; detected=false;
  eBehavior=pickBehavior(); eHuntSweeps=0;
  speedMult=.7+Math.random()*.8;
  stopHB(); clearTimeout(fakeTimer);
  surfBtn.disabled=true;
  multEl.className='zone1'; multEl.textContent='1.00×';
  updateWinDisp();
  ptEl.className=''; ptEl.textContent='PLACING BETS';
  pcEl.className=''; pcEl.textContent='7';
  povEl.className='visible';
  let cd=7;
  bcdTimer=setInterval(()=>{ cd--; pcEl.textContent=cd; if(cd<=0){clearInterval(bcdTimer);startActive();} },1000);
}

function startActive(){
  phase='active'; crashPt=genCrash(); t0=performance.now();
  povEl.className=''; surfBtn.disabled=false;
  if(soundOn&&AC)startHB(58);
  scheduleFake();
  requestAnimationFrame(loop);
}

function doSurface(){
  if(phase!=='active'||cashedOut)return;
  cashedOut=true;
  const win=bet*mult, cm=mult;
  splash(); surfBtn.disabled=true;
  winEl.textContent='▲ SURFACED '+cm.toFixed(2)+'×  +$'+win.toFixed(2)+'  — watching...';
  winEl.style.color='#00ff88';
  if(cm>sBest){sBest=cm;bestEl.textContent=cm.toFixed(2)+'×';}
  history.unshift({v:cm,w:true});
  updateStats(win,0); addHist();
}

function doCrash(){
  phase='crashed'; stopHB(); clearTimeout(fakeTimer);
  surfBtn.disabled=true; isCrash=true; crashFlash=1.0;
  multEl.className='crashed';
  setTimeout(()=>{fakeLoss();fakeLoss();},200);
  setTimeout(()=>explosion(),480);
  setTimeout(()=>{
    ptEl.className='red'; ptEl.textContent='DEPTH CHARGE HIT';
    pcEl.className='red';
    if(cashedOut){
      pcEl.textContent='CRASHED AT '+crashPt.toFixed(2)+'×  ✓ YOU WERE SAFE';
    } else {
      pcEl.textContent='CRASHED AT '+crashPt.toFixed(2)+'×';
      winEl.textContent='LOST $'+bet.toFixed(2);
      winEl.style.color='#ff4444';
      history.unshift({v:crashPt,w:false});
      updateStats(0,bet); addHist();
    }
    povEl.className='visible';
    setTimeout(nextRound,3200);
  },650);
}

function nextRound(){ rNum++;rnEl.textContent=rNum;povEl.className='';startBetting(); }

function addHist(){
  if(history.length>5)history.pop();
  hStrip.innerHTML='';
  history.forEach(h=>{
    const p=document.createElement('div');
    p.className='hpill '+(h.v<2?'low':h.v<10?'mid':'high');
    p.textContent=h.v.toFixed(2)+'×';
    hStrip.appendChild(p);
  });
}
function updateWinDisp(){
  winEl.textContent='BET $'+bet.toFixed(2)+'  →  WIN $'+(bet*mult).toFixed(2);
  winEl.style.color='#1a8850';
}

// ══════════════════════════════════════════
// ENEMY BEHAVIOR SYSTEM
// ══════════════════════════════════════════
function pickBehavior(){
  const r=Math.random();
  if(r<.30)return'hunt';
  if(r<.70)return'flee';
  return'stalk';
}

function enemyNextPosition(prog){
  // Called once per sweep detection — returns new {angle, dist}
  switch(eBehavior){

    case 'hunt': {
      // Deliberately moves closer to center each sweep
      // Feels like it "locked on" and is closing in
      eHuntSweeps++;
      const step = 0.10 + prog*0.08; // bigger steps at high mult
      const newDist = Math.max(0.10, eDist - step);
      // Angle drifts slightly toward sub (center) — not perfectly straight
      const angleAdjust = (Math.random()-0.5)*0.4;
      // After 3-4 hunt sweeps, pick new random behavior
      if(eHuntSweeps>=3+Math.floor(Math.random()*2)){
        eBehavior=pickBehavior(); eHuntSweeps=0;
      }
      return{ angle:eAngle+angleAdjust, dist:newDist };
    }

    case 'flee': {
      // Appears to be heading toward center — then jumps far away
      // Creates "I tricked it / got lucky" feeling
      // First sweep of flee: show near center
      // Second sweep: jump far away and pick new behavior
      if(eHuntSweeps===0){
        // First appearance: show relatively close — alarm!
        eHuntSweeps=1;
        creak(); // sound for drama
        return{ angle:eAngle+(Math.random()-0.5)*0.6, dist:0.15+Math.random()*0.20 };
      } else {
        // Second appearance: relief — it went somewhere else entirely
        eBehavior=pickBehavior(); eHuntSweeps=0;
        const fleeAngle=eAngle+Math.PI*(0.6+Math.random()*0.8); // opposite direction
        return{ angle:fleeAngle, dist:0.55+Math.random()*0.30 };
      }
    }

    case 'stalk': {
      // Slow, barely noticeable approach — most sinister
      // Small step each sweep, slight angle wander
      const step = 0.04 + prog*0.04 + Math.random()*0.04;
      const newDist = Math.max(0.18, eDist - step);
      const wander = (Math.random()-0.5)*0.9; // wanders but trends inward
      // Occasionally switch behavior after long stalk
      if(Math.random()<0.15){ eBehavior=pickBehavior(); eHuntSweeps=0; }
      return{ angle:eAngle+wander, dist:newDist };
    }
  }
}

function updateEnemy(){
  ePulse+=.07;

  // Crash: drift slowly toward near-center, stay visible
  if(isCrash){
    const tx=Math.cos(eAngle+.4)*0.05, ty=Math.sin(eAngle+.4)*0.05;
    const ex=Math.cos(eAngle)*eDist, ey=Math.sin(eAngle)*eDist;
    const nx=ex+(tx-ex)*.012, ny=ey+(ty-ey)*.012;
    eDist=Math.sqrt(nx*nx+ny*ny); eAngle=Math.atan2(ny,nx);
    eVisible=true; eTimer=99; return;
  }
  if(phase!=='active')return;

  const prog=Math.min((mult-1)/12,1);

  // Detect sweep passing over enemy
  const eN=((eAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const sN=((sweepA%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const dA=Math.min(Math.abs(sN-eN),Math.PI*2-Math.abs(sN-eN));

  if(dA<.14&&!detected){
    detected=true;
    eVisible=true; eTimer=26+Math.floor(prog*28);
    ping();

    // Near miss: if crash imminent, override behavior and appear very close
    const sweepPeriod=(Math.PI*2)/getSweepSpeed()/60;
    const timeLeft=(crashPt-mult)/(mult*0.046*speedMult+0.001);
    if(timeLeft<sweepPeriod*2.2&&crashPt>1.05){
      // Force near-center appearance
      eAngle=eAngle+(Math.random()-.5)*.6;
      eDist=.06+Math.random()*.16;
      creak();
    } else {
      // Normal behavior-driven teleport
      const next=enemyNextPosition(prog);
      eAngle=next.angle; eDist=next.dist;
    }
  } else if(dA>.5){
    detected=false;
  }

  if(eTimer>0){ eTimer--; if(eTimer<=0)eVisible=false; }
}

// ══════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════
function loop(ts){
  if(phase!=='active'&&phase!=='crashed')return;

  if(phase==='active'){
    const el=(ts-t0)/1000;
    mult=calcMult(el);
    if(mult>=crashPt){
      mult=crashPt; multEl.textContent=mult.toFixed(2)+'×';
      doCrash(); requestAnimationFrame(loop); return;
    }
    if(soundOn&&AC)updateHB(getBPM());
    sweepA+=getSweepSpeed();
    const[cls]=getMultColor();
    multEl.className=cls; multEl.textContent=mult.toFixed(2)+'×';
    if(!cashedOut)updateWinDisp();
    const aVal=parseFloat(document.getElementById('auto-input').value);
    if(!isNaN(aVal)&&aVal>=1.01&&mult>=aVal)doSurface();
  }
  if(phase==='crashed')sweepA+=.017;
  if(crashFlash>0)crashFlash-=.028;
  updateEnemy(); draw();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════
function draw(){
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=W*.47;
  rc.clearRect(0,0,W,H);

  const dark=getRadarDark();
  const bg=rc.createRadialGradient(cx,cy,0,cx,cy,R);
  bg.addColorStop(0,`rgba(${Math.floor(13*(1-dark*.6))},${Math.floor(51*(1-dark*.7))},${Math.floor(32*(1-dark*.6))},1)`);
  bg.addColorStop(.6,`rgba(${Math.floor(7*(1-dark*.5))},${Math.floor(26*(1-dark*.6))},${Math.floor(16*(1-dark*.5))},1)`);
  bg.addColorStop(1,`rgba(4,${Math.floor(13*(1-dark*.4))},10,1)`);
  rc.beginPath();rc.arc(cx,cy,R,0,Math.PI*2);rc.fillStyle=bg;rc.fill();

  if(crashFlash>0){
    rc.beginPath();rc.arc(cx,cy,R,0,Math.PI*2);
    rc.fillStyle=`rgba(255,0,0,${crashFlash*.65})`;rc.fill();
  }

  rc.save();rc.beginPath();rc.arc(cx,cy,R,0,Math.PI*2);rc.clip();

  [.25,.5,.75,1].forEach(r=>{
    rc.beginPath();rc.arc(cx,cy,R*r,0,Math.PI*2);
    rc.strokeStyle='#0a2e1a';rc.lineWidth=.5;rc.stroke();
  });
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    rc.beginPath();rc.moveTo(cx,cy);rc.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
    rc.strokeStyle='#0a2e1a';rc.lineWidth=.5;rc.stroke();
  }

  const[,rgb]=getMultColor();
  for(let i=0;i<32;i++){
    const t=i/32,ta=sweepA-Math.PI*.45*t;
    rc.beginPath();rc.moveTo(cx,cy);rc.arc(cx,cy,R,ta-.06,ta);rc.closePath();
    rc.fillStyle=`rgba(${rgb},${(1-t)*.17})`;rc.fill();
  }
  rc.beginPath();rc.moveTo(cx,cy);
  rc.lineTo(cx+Math.cos(sweepA)*R,cy+Math.sin(sweepA)*R);
  rc.strokeStyle=`rgba(${rgb},.85)`;rc.lineWidth=1.5;rc.stroke();

  if(eVisible){
    const ex=cx+Math.cos(eAngle)*R*eDist;
    const ey=cy+Math.sin(eAngle)*R*eDist;
    const alpha=isCrash?1.0:Math.min(eTimer/24,1.0);
    const pulse=1+Math.sin(ePulse)*.28;
    rc.beginPath();rc.arc(ex,ey,14*pulse,0,Math.PI*2);
    rc.strokeStyle=`rgba(255,68,68,${alpha*.18})`;rc.lineWidth=1;rc.stroke();
    rc.beginPath();rc.arc(ex,ey,8*pulse,0,Math.PI*2);
    rc.strokeStyle=`rgba(255,68,68,${alpha*.45})`;rc.lineWidth=1;rc.stroke();
    rc.beginPath();rc.arc(ex,ey,4,0,Math.PI*2);
    rc.fillStyle=`rgba(255,68,68,${alpha})`;rc.fill();

    // Behavior indicator: tiny directional hint
    // hunt = faint line toward center, stalk = none, flee = none
    if(eBehavior==='hunt'&&!isCrash&&alpha>.5){
      rc.beginPath();rc.moveTo(ex,ey);
      const dx=(cx-ex)*.3,dy=(cy-ey)*.3;
      rc.lineTo(ex+dx,ey+dy);
      rc.strokeStyle=`rgba(255,100,100,${alpha*.3})`;rc.lineWidth=1;rc.stroke();
    }
  }

  rc.beginPath();rc.arc(cx,cy,5,0,Math.PI*2);rc.fillStyle='#00ff88';rc.fill();
  rc.beginPath();rc.arc(cx,cy,11,0,Math.PI*2);
  rc.strokeStyle='rgba(0,255,136,.28)';rc.lineWidth=1;rc.stroke();

  rc.restore();
  rc.beginPath();rc.arc(cx,cy,R,0,Math.PI*2);
  rc.strokeStyle='#0d4020';rc.lineWidth=1;rc.stroke();
}

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
document.getElementById('bet-dn').addEventListener('click',()=>{
  if(phase!=='betting')return;
  if(bIdx>0)bIdx--;bet=BETS[bIdx];betEl.textContent='$'+bet.toFixed(2);updateWinDisp();
});
document.getElementById('bet-up').addEventListener('click',()=>{
  if(phase!=='betting')return;
  if(bIdx<BETS.length-1)bIdx++;bet=BETS[bIdx];betEl.textContent='$'+bet.toFixed(2);updateWinDisp();
});
surfBtn.addEventListener('click',doSurface);
document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();doSurface();} });
document.getElementById('sound-toggle').addEventListener('click',function(){
  ensureAC();soundOn=!soundOn;
  this.textContent=soundOn?'♪ ON':'♪ OFF';
  this.className=soundOn?'on':'';
  if(!soundOn)stopHB();else if(phase==='active')startHB(getBPM());
});
document.getElementById('start-btn').addEventListener('click',()=>{
  ensureAC();
  document.getElementById('start-overlay').style.display='none';
  resize();draw();startBetting();
});
</script>
