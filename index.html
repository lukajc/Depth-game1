<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DEPTH</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#040d1a;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; font-family:'Courier New',monospace;
  overflow:hidden; user-select:none;
}

/* ── START OVERLAY ── */
#start-overlay {
  position:fixed; inset:0; background:rgba(4,13,26,0.97);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:300; gap:18px;
}
#start-overlay h1 { color:#00ff88; font-size:42px; letter-spacing:14px; font-weight:700; }
#start-overlay p  { color:#1a6640; font-size:11px; letter-spacing:3px; text-align:center; line-height:2.2; }
#start-btn {
  background:#003d1a; border:2px solid #00ff88; color:#00ff88;
  font-family:'Courier New',monospace; font-size:14px; font-weight:700;
  letter-spacing:5px; padding:15px 44px; border-radius:8px; cursor:pointer; margin-top:8px;
}
#start-btn:hover { background:#005522; }

/* ── LAYOUT ── */
#game-container {
  display:flex; flex-direction:column; align-items:center;
  width:100%; max-width:480px; padding:12px 16px; gap:8px;
}

/* ── TOP BAR ── */
#top-bar {
  display:flex; justify-content:space-between; align-items:center;
  width:100%; max-width:380px;
}
#title { color:#00ff88; font-size:20px; letter-spacing:9px; font-weight:700; }
#best-win { color:#1a5535; font-size:10px; letter-spacing:1px; text-align:right; line-height:1.6; }
#best-win span { color:#00aa55; font-weight:700; }

/* ── SOUND TOGGLE ── */
#sound-toggle {
  position:fixed; top:12px; right:14px;
  background:#040d0a; border:1px solid #0d3320; color:#1a6640;
  font-family:'Courier New',monospace; font-size:9px; letter-spacing:2px;
  padding:4px 8px; border-radius:4px; cursor:pointer; z-index:100;
}
#sound-toggle.on { color:#00ff88; border-color:#00aa55; }

/* ── RADAR ── */
#radar-wrapper { position:relative; width:100%; aspect-ratio:1; max-width:380px; }
#radar-canvas  { width:100%; height:100%; border-radius:50%; display:block; }

/* ── PHASE OVERLAY ── */
#phase-overlay {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  border-radius:50%; pointer-events:none; opacity:0; transition:opacity 0.25s;
}
#phase-overlay.visible { opacity:1; }
#phase-text { font-size:13px; letter-spacing:4px; font-weight:700; text-align:center; color:#00ff88; }
#phase-text.red { color:#ff4444; }
#phase-count { font-size:34px; font-weight:700; text-align:center; color:#00ff88; margin-top:4px; }
#phase-count.red { color:#ff4444; font-size:13px; letter-spacing:1px; margin-top:6px; }

/* ── FAKE PLAYERS ── */
#players-feed {
  width:100%; max-width:380px; min-height:18px;
  display:flex; flex-direction:column; gap:3px;
}
.player-event {
  font-size:10px; letter-spacing:0.5px; opacity:0;
  transition:opacity 0.3s;
  padding: 0 2px;
}
.player-event.win  { color:#00aa55; }
.player-event.loss { color:#ff5555; }
.player-event.show { opacity:1; }

/* ── MULTIPLIER ── */
#multiplier-zone { text-align:center; line-height:1; }
#mult-label { color:#1a4430; font-size:9px; letter-spacing:3px; margin-bottom:2px; }
#multiplier {
  font-size:72px; font-weight:700; letter-spacing:2px;
  font-variant-numeric:tabular-nums;
  transition:color 0.4s;
  color:#00ff88;
}
#multiplier.zone1 { color:#00ff88; }
#multiplier.zone2 { color:#ccdd00; }
#multiplier.zone3 { color:#ff8800; }
#multiplier.zone4 { color:#ff3333; }
#multiplier.crashed { color:#ff2222; }

/* ── WIN DISPLAY ── */
#win-display { color:#1a8850; font-size:13px; letter-spacing:1px; text-align:center; min-height:16px; }

/* ── SESSION STATS ── */
#session-stats {
  width:100%; max-width:380px;
  display:flex; justify-content:space-between; align-items:center;
  background:#040d0a; border:1px solid #0a1e10; border-radius:6px;
  padding:6px 12px;
}
.stat-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
.stat-label { color:#0d3320; font-size:8px; letter-spacing:2px; }
.stat-value { font-size:12px; font-weight:700; }
.stat-value.pos { color:#00cc66; }
.stat-value.neg { color:#ff5555; }
.stat-value.neu { color:#1a6640; }
#stat-net { font-size:13px !important; }

/* ── HISTORY ── */
#history-strip {
  display:flex; gap:5px; justify-content:center;
  width:100%; max-width:380px;
}
.hpill {
  padding:2px 7px; border-radius:8px; font-size:10px; font-weight:700;
  flex:1; text-align:center; max-width:60px;
}
.hpill.low  { background:#1a0a0a; color:#ff6666; border:1px solid #2a0808; }
.hpill.mid  { background:#0a1a0a; color:#00cc66; border:1px solid #0a2a0a; }
.hpill.high { background:#08083a; color:#7799ff; border:1px solid #0a0a3a; }

/* ── CONTROLS ── */
#controls { display:flex; gap:10px; width:100%; max-width:380px; }
#bet-box {
  flex:1; background:#040d0a; border:1px solid #0d3320; border-radius:8px;
  padding:8px 12px; display:flex; flex-direction:column; gap:3px;
}
#bet-label { color:#1a4430; font-size:8px; letter-spacing:2px; }
#bet-row   { display:flex; align-items:center; gap:6px; }
#bet-amount { color:#00cc6a; font-size:19px; font-weight:700; flex:1; }
.bbet { background:#0a2010; border:1px solid #0d3320; color:#00aa55; font-size:15px; width:26px; height:26px; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.bbet:hover { border-color:#00ff88; }

#auto-box {
  display:flex; flex-direction:column; gap:2px;
  background:#040d0a; border:1px solid #0d3320; border-radius:8px; padding:8px 10px;
}
#auto-label { color:#1a4430; font-size:8px; letter-spacing:2px; }
#auto-row   { display:flex; align-items:center; gap:4px; }
#auto-input {
  width:54px; background:#020808; border:1px solid #0d3320; color:#00cc6a;
  font-family:'Courier New',monospace; font-size:14px; font-weight:700;
  padding:2px 4px; border-radius:3px; text-align:center;
}
#auto-input:focus { outline:none; border-color:#00ff88; }
#auto-unit { color:#1a6640; font-size:11px; }

#surface-btn {
  flex:1.6; background:#003d1a; border:2px solid #00ff88; border-radius:8px;
  color:#00ff88; font-family:'Courier New',monospace; font-size:15px; font-weight:700;
  letter-spacing:3px; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px; padding:10px;
  transition:background 0.1s, transform 0.05s;
}
#surface-btn:hover:not(:disabled) { background:#005522; }
#surface-btn:active:not(:disabled){ transform:scale(0.97); }
#surface-btn:disabled { opacity:0.28; cursor:not-allowed; border-color:#1a4430; color:#1a4430; }
#surface-btn .spre { font-size:8px; letter-spacing:3px; color:#1aff88; opacity:0.7; }

/* ── STATUS ── */
#status-bar { color:#0a2010; font-size:8px; letter-spacing:2px; text-align:center; }
</style>
</head>
<body>

<div id="start-overlay">
  <h1>DEPTH</h1>
  <p>SUBMARINE RADAR<br>CASH OUT BEFORE THEY FIND YOU</p>
  <button id="start-btn">▼ DIVE IN</button>
</div>

<button id="sound-toggle" class="on">♪ ON</button>

<div id="game-container">

  <div id="top-bar">
    <div id="title">DEPTH</div>
    <div id="best-win">BEST THIS SESSION<br>★ <span id="best-val">—</span></div>
  </div>

  <div id="radar-wrapper">
    <canvas id="radar-canvas"></canvas>
    <div id="phase-overlay">
      <div>
        <div id="phase-text"></div>
        <div id="phase-count"></div>
      </div>
    </div>
  </div>

  <div id="players-feed">
    <div class="player-event" id="pev0"></div>
    <div class="player-event" id="pev1"></div>
  </div>

  <div id="multiplier-zone">
    <div id="mult-label">MULTIPLIER</div>
    <div id="multiplier" class="zone1">1.00×</div>
  </div>

  <div id="win-display">BET $10.00  →  WIN $10.00</div>

  <div id="session-stats">
    <div class="stat-item">
      <div class="stat-label">WON</div>
      <div class="stat-value pos" id="stat-won">$0.00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">LOST</div>
      <div class="stat-value neg" id="stat-lost">$0.00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">NET</div>
      <div class="stat-value neu" id="stat-net">$0.00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">ROUNDS</div>
      <div class="stat-value neu" id="stat-rounds">0</div>
    </div>
  </div>

  <div id="history-strip"></div>

  <div id="controls">
    <div id="bet-box">
      <div id="bet-label">BET</div>
      <div id="bet-row">
        <button class="bbet" id="bet-dn">−</button>
        <div id="bet-amount">$10.00</div>
        <button class="bbet" id="bet-up">+</button>
      </div>
    </div>
    <div id="auto-box">
      <div id="auto-label">AUTO CASH AT</div>
      <div id="auto-row">
        <input id="auto-input" type="number" min="1.1" max="1000" step="0.1" placeholder="OFF">
        <span id="auto-unit">×</span>
      </div>
    </div>
    <button id="surface-btn" disabled>
      <span class="spre">PRESS TO</span>
      <span>▲ SURFACE</span>
    </button>
  </div>

  <div id="status-bar">● CONNECTED &nbsp;|&nbsp; ROUND <span id="round-num">1</span></div>
</div>

<script>
// ══════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════
let AC = null, soundOn = true;
let hbInterval = null, hbBPM = 58;

function ensureAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}

function heartbeat() {
  if (!AC || !soundOn) return;
  const t = AC.currentTime;
  // LUB
  const lo = AC.createOscillator(), lg = AC.createGain(), lf = AC.createBiquadFilter();
  lf.type='lowpass'; lf.frequency.value=130;
  lo.type='sine'; lo.frequency.setValueAtTime(58,t); lo.frequency.exponentialRampToValueAtTime(28,t+.14);
  lg.gain.setValueAtTime(0,t); lg.gain.linearRampToValueAtTime(.75,t+.02); lg.gain.exponentialRampToValueAtTime(.001,t+.24);
  lo.connect(lf); lf.connect(lg); lg.connect(AC.destination); lo.start(t); lo.stop(t+.26);
  // DUB
  const do2=AC.createOscillator(), dg=AC.createGain(), df=AC.createBiquadFilter();
  df.type='lowpass'; df.frequency.value=110;
  do2.type='sine'; do2.frequency.setValueAtTime(68,t+.20); do2.frequency.exponentialRampToValueAtTime(34,t+.34);
  dg.gain.setValueAtTime(0,t+.20); dg.gain.linearRampToValueAtTime(.48,t+.22); dg.gain.exponentialRampToValueAtTime(.001,t+.40);
  do2.connect(df); df.connect(dg); dg.connect(AC.destination); do2.start(t+.20); do2.stop(t+.42);
}

function startHB(bpm) {
  stopHB(); hbBPM = bpm;
  if (!soundOn || !AC) return;
  heartbeat();
  hbInterval = setInterval(() => heartbeat(), 60000/hbBPM);
}
function updateHB(bpm) {
  bpm = Math.round(bpm);
  if (bpm === hbBPM) return;
  hbBPM = bpm; stopHB();
  if (soundOn && AC && phase==='active') { heartbeat(); hbInterval = setInterval(()=>heartbeat(), 60000/hbBPM); }
}
function stopHB() { clearInterval(hbInterval); hbInterval=null; }

function ping() {
  if (!AC||!soundOn) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
  f.type='bandpass'; f.frequency.value=900; f.Q.value=9;
  o.type='sine'; o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(440,t+.5);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.15,t+.02); g.gain.exponentialRampToValueAtTime(.001,t+.6);
  o.connect(f); f.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+.65);
}

function creak() {
  if (!AC||!soundOn) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
  f.type='bandpass'; f.frequency.value=210; f.Q.value=3;
  o.type='sawtooth'; o.frequency.setValueAtTime(190,t); o.frequency.linearRampToValueAtTime(85,t+.35);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.10,t+.04); g.gain.exponentialRampToValueAtTime(.001,t+.45);
  o.connect(f); f.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+.5);
}

function explosion() {
  if (!AC||!soundOn) return;
  const t=AC.currentTime, sr=AC.sampleRate;
  const buf=AC.createBuffer(1,sr*1.8,sr), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const ns=AC.createBufferSource(); ns.buffer=buf;
  const ng=AC.createGain(), nf=AC.createBiquadFilter();
  nf.type='lowpass'; nf.frequency.value=280;
  ng.gain.setValueAtTime(.85,t); ng.gain.exponentialRampToValueAtTime(.001,t+1.6);
  ns.connect(nf); nf.connect(ng); ng.connect(AC.destination); ns.start(t);
  const bo=AC.createOscillator(), bg=AC.createGain();
  bo.type='sine'; bo.frequency.setValueAtTime(85,t); bo.frequency.exponentialRampToValueAtTime(18,t+.9);
  bg.gain.setValueAtTime(.9,t); bg.gain.exponentialRampToValueAtTime(.001,t+1.1);
  bo.connect(bg); bg.connect(AC.destination); bo.start(t); bo.stop(t+1.2);
}

function splash() {
  if (!AC||!soundOn) return;
  const t=AC.currentTime;
  for(let i=0;i<4;i++){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(420+i*130,t+i*.07); o.frequency.exponentialRampToValueAtTime(200,t+i*.07+.16);
    g.gain.setValueAtTime(.11,t+i*.07); g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.22);
    o.connect(g); g.connect(AC.destination); o.start(t+i*.07); o.stop(t+i*.07+.24);
  }
}

// ══════════════════════════════════════════
// FAKE PLAYERS
// ══════════════════════════════════════════
const NAMES = ['Alex K.','Giorgi M.','Nino T.','David L.','Mariam S.','Lasha B.',
               'Ana G.','Zura K.','Tamta R.','Irakli P.','Sophie D.','Nika V.',
               'Elene C.','Tornike J.','Keti N.','Beka O.','Salome A.','Gigi F.'];
let feedSlot = 0;

function fakeCashout(mult) {
  const name = NAMES[Math.floor(Math.random()*NAMES.length)];
  const betAmt = [1,2,5,10,20,50][Math.floor(Math.random()*6)];
  const win = (betAmt * mult).toFixed(2);
  showFeed(`▲ ${name} cashed out  ${mult.toFixed(2)}×  +$${win}`, 'win');
}

function fakeLoss() {
  const name = NAMES[Math.floor(Math.random()*NAMES.length)];
  showFeed(`✗ ${name} lost their bet`, 'loss');
}

function showFeed(msg, type) {
  const el = document.getElementById('pev' + feedSlot);
  feedSlot = (feedSlot + 1) % 2;
  el.textContent = msg;
  el.className = 'player-event ' + type;
  requestAnimationFrame(() => { el.classList.add('show'); });
  setTimeout(() => { el.classList.remove('show'); }, 3000);
}

let fakeTimer = null;
function scheduleFakePlayers() {
  clearTimeout(fakeTimer);
  if (phase !== 'active') return;
  const delay = 800 + Math.random() * 2400;
  fakeTimer = setTimeout(() => {
    if (phase !== 'active') return;
    // Fake cashout at current multiplier ±variance
    const fakeM = multiplier * (0.85 + Math.random() * 0.4);
    if (fakeM >= 1.05) fakeCashout(parseFloat(fakeM.toFixed(2)));
    scheduleFakePlayers();
  }, delay);
}

// ══════════════════════════════════════════
// GAME
// ══════════════════════════════════════════
const cv = document.getElementById('radar-canvas');
const cx2 = cv.getContext('2d');
const multEl = document.getElementById('multiplier');
const winEl  = document.getElementById('win-display');
const surfBtn= document.getElementById('surface-btn');
const povEl  = document.getElementById('phase-overlay');
const ptEl   = document.getElementById('phase-text');
const pcEl   = document.getElementById('phase-count');
const rnEl   = document.getElementById('round-num');
const betEl  = document.getElementById('bet-amount');
const hStrip = document.getElementById('history-strip');
const bestEl = document.getElementById('best-val');
const wonEl  = document.getElementById('stat-won');
const lostEl = document.getElementById('stat-lost');
const netEl  = document.getElementById('stat-net');
const rndEl  = document.getElementById('stat-rounds');

const BETS = [1,2,5,10,20,50,100,200,500];
let bIdx=3, bet=10;
let rNum=1, phase='betting', mult=1, crashPt=1;
let sweepA = -Math.PI/2;
let t0 = 0, bcdTimer=null, history=[], cashedOut=false;
let speedMult = 1.0;

// Session stats
let sTotalWon=0, sTotalLost=0, sRounds=0, sBest=0;

// Enemy
let eAngle=Math.random()*Math.PI*2, eDist=0.75;
let eVisible=false, eTimer=0, ePulse=0;
let detected=false;
let isCrash=false, crashFlash=0;

// Near-miss: last 2 sweeps before crash show dot close to center
let nearMissActive=false;

function resize() {
  const w=document.getElementById('radar-wrapper').offsetWidth;
  cv.width=w; cv.height=w;
}
resize(); window.addEventListener('resize',resize);

function genCrash() {
  if (Math.random()<.04) return 1.00;
  return Math.max(1.01, 1/(1-Math.random()*.96));
}

function getBPM() {
  if (mult<3) return 58;
  return Math.floor(58 + Math.min((mult-3)/12,1)*62);
}

function getSweepSpeed() {
  if (mult<3) return 0.020;
  return 0.020 + Math.min((mult-3)/12,1)*0.052;
}

function getMultColor() {
  if (mult<3)  return ['zone1','#00ff88'];
  if (mult<7)  return ['zone2','#ccdd00'];
  if (mult<15) return ['zone3','#ff8800'];
  return ['zone4','#ff3333'];
}

function getRadarDark() {
  // 0 at 1x, 1 at 20x — darkens the radar bg
  return Math.min((mult-1)/19, 1);
}

function calcMult(elapsed) {
  return Math.max(1.00, Math.pow(Math.E, elapsed*0.046*speedMult));
}

function updateStats(won, lost) {
  sTotalWon  += won;
  sTotalLost += lost;
  sRounds++;
  const net = sTotalWon - sTotalLost;
  wonEl.textContent  = '$'+sTotalWon.toFixed(2);
  lostEl.textContent = '$'+sTotalLost.toFixed(2);
  netEl.textContent  = (net>=0?'+':'')+net.toFixed(2);
  netEl.className    = 'stat-value '+(net>0?'pos':net<0?'neg':'neu');
  rndEl.textContent  = sRounds;
  netEl.id='stat-net';
}

// ── PHASES ──
function startBetting() {
  phase='betting'; mult=1; cashedOut=false;
  sweepA=-Math.PI/2; crashFlash=0; isCrash=false; nearMissActive=false;
  eAngle=Math.random()*Math.PI*2; eDist=.70+Math.random()*.22;
  eVisible=false; eTimer=0; detected=false;
  speedMult = .7+Math.random()*.8;

  stopHB(); clearTimeout(fakeTimer);
  surfBtn.disabled=true;
  multEl.className='zone1'; multEl.textContent='1.00×';
  updateWinDisp();
  ptEl.className=''; ptEl.textContent='PLACING BETS';
  pcEl.className=''; pcEl.textContent='5';
  povEl.className='visible';

  let cd=7;
  bcdTimer=setInterval(()=>{
    cd--; pcEl.textContent=cd;
    if(cd<=0){ clearInterval(bcdTimer); startActive(); }
  },1000);
}

function startActive() {
  phase='active'; crashPt=genCrash();
  t0=performance.now(); povEl.className='';
  surfBtn.disabled=false;
  if(soundOn&&AC) startHB(58);
  scheduleFakePlayers();
  requestAnimationFrame(loop);
}

function doSurface() {
  if(phase!=='active'||cashedOut) return;
  cashedOut=true;
  // Keep phase='active' — radar keeps running, player watches crash point
  const win=bet*mult;
  const cashedMult=mult;
  splash();
  surfBtn.disabled=true;
  // Show result in win display, no overlay — game continues visually
  winEl.textContent='▲ SURFACED  '+cashedMult.toFixed(2)+'×  +$'+win.toFixed(2)+'  — watching crash point...';
  winEl.style.color='#00ff88';
  if(cashedMult>sBest){ sBest=cashedMult; bestEl.textContent=cashedMult.toFixed(2)+'×'; }
  history.unshift({v:cashedMult,w:true});
  updateStats(win,0);
  addHist();
  // Heartbeat keeps going so tension remains
}

function doCrash() {
  phase='crashed'; stopHB(); clearTimeout(fakeTimer);
  surfBtn.disabled=true;
  isCrash=true; crashFlash=1.0;
  multEl.className='crashed';
  setTimeout(()=>{ fakeLoss(); fakeLoss(); },200);
  setTimeout(()=>explosion(),480);
  setTimeout(()=>{
    ptEl.className='red'; ptEl.textContent='DEPTH CHARGE HIT';
    pcEl.className='red';
    // If player had cashed out, show "you were safe" message
    if(cashedOut){
      pcEl.textContent='CRASHED AT '+crashPt.toFixed(2)+'×  ✓ YOU WERE SAFE';
    } else {
      pcEl.textContent='CRASHED AT '+crashPt.toFixed(2)+'×';
      winEl.textContent='LOST $'+bet.toFixed(2);
      winEl.style.color='#ff4444';
      history.unshift({v:crashPt,w:false});
      updateStats(0,bet);
      addHist();
    }
    povEl.className='visible';
    setTimeout(nextRound,3200);
  },650);
}

function nextRound() {
  rNum++; rnEl.textContent=rNum; povEl.className='';
  startBetting();
}

function addHist() {
  if(history.length>5) history.pop();
  hStrip.innerHTML='';
  history.forEach(h=>{
    const p=document.createElement('div');
    p.className='hpill '+(h.v<2?'low':h.v<10?'mid':'high');
    p.textContent=h.v.toFixed(2)+'×';
    hStrip.appendChild(p);
  });
}

function updateWinDisp() {
  winEl.textContent='BET $'+bet.toFixed(2)+'  →  WIN $'+(bet*mult).toFixed(2);
  winEl.style.color='#1a8850';
}

// ── ENEMY DOT — teleport between sweeps ──
function updateEnemy() {
  ePulse+=.07;

  if(isCrash) {
    // Drift slowly toward center — not perfectly straight
    const tx=Math.cos(eAngle+.4)*0.06, ty=Math.sin(eAngle+.4)*0.06;
    const ex=Math.cos(eAngle)*eDist, ey=Math.sin(eAngle)*eDist;
    const nx=ex+(tx-ex)*.010, ny=ey+(ty-ey)*.010;
    eDist=Math.sqrt(nx*nx+ny*ny); eAngle=Math.atan2(ny,nx);
    eVisible=true; eTimer=99; return;
  }

  if(phase!=='active') return;

  const prog=Math.min((mult-1)/12,1);

  // Check sweep passing enemy
  const eN=((eAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const sN=((sweepA%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const dA=Math.min(Math.abs(sN-eN),Math.PI*2-Math.abs(sN-eN));

  if(dA<.14&&!detected) {
    detected=true;
    eVisible=true; eTimer=28+Math.floor(prog*26);
    ping();

    // NEAR MISS: if crash is imminent (within ~2 sweeps), show dot very close
    const sweepTime = (Math.PI*2) / getSweepSpeed() / 60; // approx seconds per sweep
    const timeLeft = (crashPt - mult) / (mult * 0.046 * speedMult);
    if(timeLeft < sweepTime*2.2 && crashPt>1.05) {
      nearMissActive=true;
    }

    // Teleport to new position (invisible move)
    if(nearMissActive) {
      // Near-miss: appear close to center
      eAngle = eAngle + (Math.random()-.5)*.8;
      eDist = .08 + Math.random()*.18;
      creak();
    } else {
      // Normal: wander + gentle inward bias
      eAngle = eAngle + (Math.random()-.5)*1.3;
      const inward = .06 + prog*.08;
      eDist = Math.max(.20, Math.min(.90, eDist - inward*Math.random() + (Math.random()-.5)*.18));
    }
  } else if(dA>.5) {
    detected=false;
  }

  if(eTimer>0){ eTimer--; if(eTimer<=0) eVisible=false; }
}

// ── MAIN LOOP ──
function loop(ts) {
  if(phase!=='active'&&phase!=='crashed') return;

  if(phase==='active'){
    const el=(ts-t0)/1000;
    mult=calcMult(el);
    if(mult>=crashPt){
      mult=crashPt; multEl.textContent=mult.toFixed(2)+'×';
      doCrash(); requestAnimationFrame(loop); return;
    }
    if(soundOn&&AC) updateHB(getBPM());
    sweepA+=getSweepSpeed();
    const [cls]=getMultColor();
    multEl.className=cls;
    multEl.textContent=mult.toFixed(2)+'×';
    if(!cashedOut) updateWinDisp();

    // Auto cash-out
    const aVal=parseFloat(document.getElementById('auto-input').value);
    if(!isNaN(aVal)&&aVal>=1.01&&mult>=aVal) doSurface();
  }

  if(phase==='crashed') sweepA+=.017;
  if(crashFlash>0) crashFlash-=.028;

  updateEnemy();
  draw();
  requestAnimationFrame(loop);
}

// ── DRAW ──
function draw() {
  const W=cv.width, H=cv.height, cx=W/2, cy=H/2, R=W*.47;
  cx2.clearRect(0,0,W,H);

  // Radar bg — darkens with depth
  const dark=getRadarDark();
  const bgGrad=cx2.createRadialGradient(cx,cy,0,cx,cy,R);
  const c0=`rgba(${Math.floor(13*(1-dark*0.6))},${Math.floor(51*(1-dark*0.7))},${Math.floor(32*(1-dark*0.6))},1)`;
  const c1=`rgba(${Math.floor(7*(1-dark*0.5))},${Math.floor(26*(1-dark*0.6))},${Math.floor(16*(1-dark*0.5))},1)`;
  const c2=`rgba(4,${Math.floor(13*(1-dark*0.4))},10,1)`;
  bgGrad.addColorStop(0,c0); bgGrad.addColorStop(.6,c1); bgGrad.addColorStop(1,c2);
  cx2.beginPath(); cx2.arc(cx,cy,R,0,Math.PI*2); cx2.fillStyle=bgGrad; cx2.fill();

  // Crash flash
  if(crashFlash>0){
    cx2.beginPath(); cx2.arc(cx,cy,R,0,Math.PI*2);
    cx2.fillStyle=`rgba(255,0,0,${crashFlash*.65})`; cx2.fill();
  }

  cx2.save(); cx2.beginPath(); cx2.arc(cx,cy,R,0,Math.PI*2); cx2.clip();

  // Grid
  [.25,.5,.75,1].forEach(r=>{
    cx2.beginPath(); cx2.arc(cx,cy,R*r,0,Math.PI*2);
    cx2.strokeStyle='#0a2e1a'; cx2.lineWidth=.5; cx2.stroke();
  });
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    cx2.beginPath(); cx2.moveTo(cx,cy);
    cx2.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
    cx2.strokeStyle='#0a2e1a'; cx2.lineWidth=.5; cx2.stroke();
  }

  // Sweep trail — color matches multiplier zone
  const [,sweepColor]=getMultColor();
  const rgb = sweepColor==='#00ff88'?'0,255,136':sweepColor==='#ccdd00'?'200,220,0':sweepColor==='#ff8800'?'255,136,0':'255,50,50';
  for(let i=0;i<32;i++){
    const t=i/32, ta=sweepA-Math.PI*.45*t;
    cx2.beginPath(); cx2.moveTo(cx,cy);
    cx2.arc(cx,cy,R,ta-.06,ta); cx2.closePath();
    cx2.fillStyle=`rgba(${rgb},${(1-t)*.17})`; cx2.fill();
  }

  // Sweep arm
  cx2.beginPath(); cx2.moveTo(cx,cy);
  cx2.lineTo(cx+Math.cos(sweepA)*R,cy+Math.sin(sweepA)*R);
  cx2.strokeStyle=sweepColor==='#00ff88'?'rgba(0,255,136,.85)':`rgba(${rgb},.85)`;
  cx2.lineWidth=1.5; cx2.stroke();

  // Enemy dot
  if(eVisible){
    const ex2=cx+Math.cos(eAngle)*R*eDist;
    const ey2=cy+Math.sin(eAngle)*R*eDist;
    const alpha=isCrash?1.0:Math.min(eTimer/26,1.0);
    const pulse=1+Math.sin(ePulse)*.28;
    cx2.beginPath(); cx2.arc(ex2,ey2,14*pulse,0,Math.PI*2);
    cx2.strokeStyle=`rgba(255,68,68,${alpha*.18})`; cx2.lineWidth=1; cx2.stroke();
    cx2.beginPath(); cx2.arc(ex2,ey2,8*pulse,0,Math.PI*2);
    cx2.strokeStyle=`rgba(255,68,68,${alpha*.45})`; cx2.lineWidth=1; cx2.stroke();
    cx2.beginPath(); cx2.arc(ex2,ey2,4,0,Math.PI*2);
    cx2.fillStyle=`rgba(255,68,68,${alpha})`; cx2.fill();
  }

  // Sub center
  cx2.beginPath(); cx2.arc(cx,cy,5,0,Math.PI*2); cx2.fillStyle='#00ff88'; cx2.fill();
  cx2.beginPath(); cx2.arc(cx,cy,11,0,Math.PI*2);
  cx2.strokeStyle='rgba(0,255,136,.28)'; cx2.lineWidth=1; cx2.stroke();

  cx2.restore();
  cx2.beginPath(); cx2.arc(cx,cy,R,0,Math.PI*2);
  cx2.strokeStyle='#0d4020'; cx2.lineWidth=1; cx2.stroke();
}

// ── CONTROLS ──
document.getElementById('bet-dn').addEventListener('click',()=>{
  if(phase!=='betting') return;
  if(bIdx>0) bIdx--;
  bet=BETS[bIdx]; betEl.textContent='$'+bet.toFixed(2); updateWinDisp();
});
document.getElementById('bet-up').addEventListener('click',()=>{
  if(phase!=='betting') return;
  if(bIdx<BETS.length-1) bIdx++;
  bet=BETS[bIdx]; betEl.textContent='$'+bet.toFixed(2); updateWinDisp();
});
surfBtn.addEventListener('click',doSurface);
document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();doSurface();} });

document.getElementById('sound-toggle').addEventListener('click',function(){
  ensureAC(); soundOn=!soundOn;
  this.textContent=soundOn?'♪ ON':'♪ OFF';
  this.className=soundOn?'on':'';
  if(!soundOn) stopHB();
  else if(phase==='active') startHB(getBPM());
});

document.getElementById('start-btn').addEventListener('click',()=>{
  ensureAC();
  document.getElementById('start-overlay').style.display='none';
  draw(); startBetting();
});
</script>
